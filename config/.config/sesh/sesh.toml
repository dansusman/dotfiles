sort_order = ["tmux", "config", "tmuxinator", "zoxide"]

# default

[default_session]
preview_command = "eza --all --git-ignore --tree --icons=always --color=always --level=1 {}"

# general development

[[session]]
name = "new worktree"
path = "~/Developer/notability"
startup_command = "ntb_new_worktree"
preview_command = "bat --language=bash --style=snip --color=always ~/.dotfiles/config/bin/ntb_new_worktree"

[[session]]
name = "new agent"
path = "~/Developer/notability"
startup_command = "ntb_agent_worktree"
preview_command = "bat --language=bash --style=snip --color=always ~/.dotfiles/config/bin/ntb_agent_worktree"

[[session]]
name = "my pr"
path = "~/Developer/notability"
startup_command = "ntb_agent_worktree_from_pr"
preview_command = "bat --language=bash --style=snip --color=always ~/.dotfiles/config/bin/ntb_agent_worktree_from_pr"

[[session]]
name = "their pr"
path = "~/Developer/notability"
startup_command = "ntb_review_pr"
preview_command = "bat --language=bash --style=snip --color=always ~/.dotfiles/config/bin/ntb_review_pr"

[[session]]
name = "cleanup worktrees"
path = "~/Developer/notability"
startup_command = "ntb_cleanup_worktrees"
preview_command = "bat --language=bash --style=snip --color=always ~/.dotfiles/config/bin/ntb_cleanup_worktrees"

[[session]]
name = "pick worktree"
path = "~/Developer/notability/"
startup_command = "sesh connect $(git worktree list | awk '{print $1}' | gum filter --limit 1 --fuzzy --no-sort --placeholder 'Pick a worktree' --prompt='🌲') && exit"
preview_command = "git -C ~/Developer/notability/ worktree list"

[[session]]
name = "notability"
path = "~/Developer/nb-gb"
startup_command = "but"

[[session]]
name = "gh dash"
path = "~/Developer/notability/review"
startup_command = "gh dash"

[[session]]
name = "staging"
path = "~/Developer/notability/staging"
startup_command = "git pull"

[[session]]
name = "curious"
path = "~/scratch"
startup_command = "claude --dangerously-skip-permissions"

# config shortcuts

[[session]]
name = "dotfiles"
path = "~/.dotfiles"

[[session]]
name = "tmux config"
path = "~/.dotfiles/tmux"
startup_command = "nvim .tmux.conf"
preview_command = "bat --language=bash --style=snip --color=always ~/.dotfiles/tmux/.tmux.conf"

[[session]]
name = "lazygit config"
path = "~/.dotfiles/config/.config/lazygit"
startup_command = "nvim config.yml"
preview_command = "bat --language=bash --style=snip --color=always ~/.dotfiles/config/.config/lazygit/config.yml"

[[session]]
name = "sesh config"
path = "~/.dotfiles/config/.config/sesh"
startup_command = "nvim sesh.toml"
preview_command = "bat --language=toml --style=snip --color=always ~/.dotfiles/config/.config/sesh"

# misc
[[session]]
name = "default"
path = "~"

[[session]]
name = "Downloads"
path = "~/Downloads"
startup_command = "yazi"

# windows

[[window]]
name = "git"
startup_script = "git pull && lazygit"
