[appearance]

[appearance.themes]
system_theme = false
theme = {
  custom = { name = "Gruber Lighter", path = "/Users/danielsusman/.warp/themes/gruber-lighter.yaml" },
}

[appearance.vertical_tabs]
enabled = true
view_mode = "compact"

[appearance.window]
zoom_level = 110

[appearance.text]
notebook_font_size = 14.0
font_size = 13.0

[general]
default_session_mode = "agent"

[agents]

[agents.third_party]
should_render_cli_agent_toolbar = true

[agents.warp_agent]
is_any_ai_enabled = true

[agents.warp_agent.other]
show_agent_notifications = true
show_conversation_history = true

[code]

[code.editor]
show_code_review_button = true
show_project_explorer = true
show_global_search = true

[warp_drive]
enabled = true

[text_editing]
vim_mode_enabled = true

[terminal]

[terminal.input]
alias_expansion_enabled = false

[notifications]
toast_duration_secs = 8
