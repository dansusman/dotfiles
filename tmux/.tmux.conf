unbind C-b
set-option -g prefix C-a;
set -g base-index 1
bind-key C-a send-prefix

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ',*:Tc'
set -g mode-style "bg=#404D8C,fg=#F5F1E8"
set -g extended-keys on
set -g extended-keys-format csi-u
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
set -ga update-environment COLORTERM

bind Enter copy-mode
bind -n M-Enter copy-mode

set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# vim-like pane switching
bind -r ^ last-window
bind -r N previous-window

bind-key J resize-pane -D 5
bind-key K resize-pane -U 5
bind-key H resize-pane -L 5
bind-key L resize-pane -R 5

# move intuitive split pane
# split panes using | and -
bind v split-window -h
bind s split-window

# panes open in current directory
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Git worktree window selection; assumes the following worktree-window mapping
# 1: staging
# 2: feature
# 3: review
# 4: iterate
# 5: dots
# bind g select-window -t 1
# bind e select-window -t 2
# bind w select-window -t 3
# bind i select-window -t 4
# bind d select-window -t 5

unbind '"'
unbind %

set -sg escape-time 10
set -g status-interval 2
bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt
set -g detach-on-destroy off  # don't exit from tmux when closing a session
set -g renumber-windows on

# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf

# global sessions — sesh-pick decorates rows with Claude status glyphs and
# animates running sessions via fzf load->reload-sync chain.
bind-key "K" run-shell "~/.dotfiles/config/bin/sesh-pick"

# root sessions
bind-key "R" run-shell "~/.dotfiles/config/bin/sesh-pick root"

# show lazygit pop up window
bind -N "lazygit " g display-popup -w 90% -h 90% -E "lazygit 2> /dev/null"

# add claude code split
bind-key "E" split-window -h "claude"

# Enable mouse mode
set -g mouse on

# Vim mode
set -g mode-keys vi


run '~/.tmux/theme.tmux'

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'Ataraxy-Labs/opensessions'

# Initialize TMUX plugin manager 
# (keep this line at the very bottom of tmux.conf)
run '/opt/homebrew/opt/tpm/share/tpm/tpm'
